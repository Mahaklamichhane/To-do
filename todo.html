<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --a1: #818cf8;
      --a2: #6366f1;
      --glow: rgba(99,102,241,0.35);
      --bg: #0a0a14;
      --card: rgba(20,20,38,0.75);
      --border: rgba(45,45,90,0.55);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: #e0e0f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated BG orbs ── */
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.12;
      animation: driftOrb linear infinite;
    }
    .orb1 { width: 500px; height: 500px; background: var(--a2); top: -150px; left: -100px; animation-duration: 22s; }
    .orb2 { width: 360px; height: 360px; background: #ec4899;  top: 38%; right: -80px;   animation-duration: 28s; animation-delay: -9s; }
    .orb3 { width: 420px; height: 420px; background: #06b6d4;  bottom: -120px; left: 28%; animation-duration: 32s; animation-delay: -16s; }
    @keyframes driftOrb {
      0%,100% { transform: translate(0,0)   scale(1);    }
      25%      { transform: translate(40px,-40px) scale(1.06); }
      50%      { transform: translate(70px, 25px) scale(0.94); }
      75%      { transform: translate(-25px,50px) scale(1.03); }
    }

    /* ── Floating particles ── */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute; border-radius: 50%;
      animation: rise linear infinite;
      opacity: 0;
    }
    @keyframes rise {
      0%   { opacity: 0;   transform: translateY(0)       scale(0); }
      10%  { opacity: 0.6; transform: translateY(-10px)    scale(1); }
      90%  { opacity: 0.2; }
      100% { opacity: 0;   transform: translateY(-200px) scale(0.3); }
    }

    /* ═══════════════════════════════════════════
       USER SELECTION SCREEN
    ═══════════════════════════════════════════ */
    #user-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(8,8,16,0.92);
      backdrop-filter: blur(24px);
      padding: 32px 16px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #user-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.04); }

    #user-screen .logo {
      font-size: 2.4rem; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #818cf8 0%, #ec4899 50%, #06b6d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }
    #user-screen .tagline { color: #4b5563; font-size: 0.95rem; margin-bottom: 44px; }

    .user-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

    .user-card {
      background: rgba(18,18,32,0.9);
      border: 1px solid rgba(50,50,100,0.6);
      border-radius: 28px; padding: 36px 30px;
      text-align: center; cursor: pointer; min-width: 165px;
      position: relative; overflow: hidden;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    /* Shine sweep */
    .user-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .user-card:hover::after { transform: translateX(100%); }

    .user-card[data-u="mahak"]:hover      { border-color: #ec4899; box-shadow: 0 0 0 1px #ec489930, 0 24px 48px rgba(236,72,153,0.25); transform: translateY(-10px) scale(1.02); }
    .user-card[data-u="denish"]:hover     { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f630, 0 24px 48px rgba(59,130,246,0.25);  transform: translateY(-10px) scale(1.02); }
    .user-card[data-u="shreeshail"]:hover { border-color: #10b981; box-shadow: 0 0 0 1px #10b98130, 0 24px 48px rgba(16,185,129,0.25);  transform: translateY(-10px) scale(1.02); }

    .uav {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      position: relative;
      animation: avatarPulse 3s ease-in-out infinite;
    }
    @keyframes avatarPulse {
      0%,100% { box-shadow: 0 0 0 0px var(--ring); }
      50%      { box-shadow: 0 0 0 8px transparent; }
    }
    .user-card[data-u="mahak"]      .uav { background: linear-gradient(135deg,#ec4899,#8b5cf6); --ring: rgba(236,72,153,0.4); box-shadow: 0 0 28px rgba(236,72,153,0.45); }
    .user-card[data-u="denish"]     .uav { background: linear-gradient(135deg,#3b82f6,#06b6d4); --ring: rgba(59,130,246,0.4);  box-shadow: 0 0 28px rgba(59,130,246,0.45); }
    .user-card[data-u="shreeshail"] .uav { background: linear-gradient(135deg,#10b981,#6366f1); --ring: rgba(16,185,129,0.4);  box-shadow: 0 0 28px rgba(16,185,129,0.45); }

    .uname { font-size: 1.15rem; font-weight: 800; margin-bottom: 5px; }
    .user-card[data-u="mahak"]      .uname { color: #f9a8d4; }
    .user-card[data-u="denish"]     .uname { color: #93c5fd; }
    .user-card[data-u="shreeshail"] .uname { color: #6ee7b7; }

    .utasks { font-size: 0.78rem; color: #4b5563; }

    /* ═══════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════ */
    #app { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      background: rgba(12,12,22,0.75);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 50;
    }
    .hlogo { font-size: 1.35rem; font-weight: 900; }
    .hlogo span {
      background: linear-gradient(135deg, var(--a1), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #clock { font-size: 0.78rem; color: #a5b4fc; text-align: right; line-height: 1.65; }

    .ubadge {
      display: flex; align-items: center; gap: 9px;
      background: rgba(30,30,55,0.6);
      border: 1px solid var(--border); border-radius: 50px;
      padding: 5px 14px 5px 7px;
      cursor: pointer; transition: all 0.25s;
    }
    .ubadge:hover { border-color: var(--a2); background: rgba(99,102,241,0.15); }
    .ubadge .bav { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .ubadge .bname { font-size: 0.83rem; font-weight: 700; }
    .ubadge .bswitch { font-size: 0.68rem; color: #4b5563; }

    /* ── Main layout ── */
    main { max-width: 800px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── Add-task card ── */
    .add-card {
      background: var(--card);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 22px; padding: 24px;
      margin-bottom: 26px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      position: relative; overflow: hidden;
    }
    .add-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--a2), var(--a1), #ec4899);
      animation: borderSlide 3s linear infinite;
      background-size: 200%;
    }
    @keyframes borderSlide {
      0%   { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }
    .add-card h2 {
      font-size: 0.78rem; color: var(--a1);
      text-transform: uppercase; letter-spacing: 2.5px; font-weight: 800;
      margin-bottom: 16px;
    }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-row input[type="text"],
    .form-row input[type="time"],
    .form-row select {
      background: rgba(10,10,20,0.7);
      border: 1px solid rgba(60,60,120,0.45);
      border-radius: 12px; color: #e0e0f0;
      padding: 11px 15px; font-size: 0.9rem; outline: none;
      transition: all 0.25s;
    }
    .form-row input[type="text"] { flex: 1; min-width: 180px; }
    .form-row input:focus, .form-row select:focus {
      border-color: var(--a2);
      box-shadow: 0 0 0 3px var(--glow);
    }
    select option { background: #14142a; }

    .btn-add {
      background: linear-gradient(135deg, var(--a2), var(--a1));
      color: #fff; border: none; border-radius: 12px;
      padding: 11px 24px; font-size: 0.9rem; font-weight: 800;
      cursor: pointer; transition: all 0.25s;
      position: relative; overflow: hidden;
    }
    .btn-add::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-add:hover::before { opacity: 1; }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--glow); }
    .btn-add:active { transform: translateY(0); }

    /* ── Toggle ── */
    .notif-row { margin-top: 14px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #a5b4fc; }
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #2d2d5a; border-radius: 22px; cursor: pointer; transition: background 0.2s; }
    .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle input:checked + .slider { background: var(--a2); }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* ── Stats ── */
    .stats { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
    .stat-chip {
      background: var(--card); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 18px;
      padding: 16px 20px; font-size: 0.8rem; flex: 1; text-align: center;
      transition: all 0.25s;
    }
    .stat-chip:hover { border-color: var(--a2); transform: translateY(-3px); box-shadow: 0 8px 24px var(--glow); }
    .stat-chip strong {
      display: block; font-size: 1.8rem; font-weight: 900;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-chip strong.pop { animation: numPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes numPop { 0% { transform: scale(1.4); } 100% { transform: scale(1); } }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 22px; }
    .progress-label { font-size: 0.78rem; color: #4b5563; margin-bottom: 7px; display: flex; justify-content: space-between; }
    .progress-label span:last-child { color: var(--a1); font-weight: 700; }
    .progress-bar { height: 8px; background: rgba(40,40,80,0.6); border-radius: 4px; overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--a2), var(--a1), #ec4899);
      background-size: 200%;
      transition: width 0.55s cubic-bezier(0.34,1.56,0.64,1);
      animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer { 0% { background-position: 100%; } 100% { background-position: -100%; } }

    /* ── Filter tabs ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn {
      background: var(--card); backdrop-filter: blur(10px);
      border: 1px solid var(--border); color: #a5b4fc;
      border-radius: 50px; padding: 7px 18px; font-size: 0.8rem;
      cursor: pointer; transition: all 0.22s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: linear-gradient(135deg, var(--a2), var(--a1));
      border-color: transparent; color: #fff;
      box-shadow: 0 4px 16px var(--glow);
    }

    /* ── Task list ── */
    #task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--card); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 18px;
      padding: 14px 18px; display: flex; align-items: center; gap: 14px;
      transition: all 0.25s;
      animation: slideIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)     scale(1); }
    }
    .task-item.removing { animation: slideOut 0.3s ease forwards; }
    @keyframes slideOut {
      to { opacity: 0; transform: translateX(50px) scale(0.94); max-height: 0; padding: 0; margin: 0; overflow: hidden; }
    }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-title { text-decoration: line-through; color: #4b5563; }
    .task-item:hover:not(.done) {
      border-color: var(--a2);
      box-shadow: 0 6px 28px var(--glow);
      transform: translateY(-2px);
    }

    /* Checkbox */
    .check-wrap { position: relative; flex-shrink: 0; }
    .check-wrap input[type="checkbox"] { opacity: 0; position: absolute; width: 26px; height: 26px; cursor: pointer; z-index: 1; }
    .check-box {
      width: 26px; height: 26px; border-radius: 8px;
      border: 2px solid rgba(80,80,160,0.55); background: rgba(10,10,20,0.5);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }
    .check-wrap input:checked ~ .check-box {
      background: linear-gradient(135deg, var(--a2), var(--a1));
      border-color: transparent;
      box-shadow: 0 0 14px var(--glow);
      animation: checkBounce 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes checkBounce { 0% { transform: scale(0.7); } 100% { transform: scale(1); } }
    .check-wrap input:checked ~ .check-box::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 900; }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 0.92rem; font-weight: 500; word-break: break-word; }
    .task-meta { margin-top: 5px; font-size: 0.74rem; color: #4b5563; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .cat-badge { display: inline-block; border-radius: 6px; padding: 2px 9px; font-size: 0.7rem; font-weight: 700; }

    .btn-del {
      background: none; border: none; color: #374151;
      font-size: 1rem; cursor: pointer; padding: 6px 8px;
      border-radius: 8px; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-del:hover { color: #f87171; background: rgba(248,113,113,0.1); transform: scale(1.15) rotate(-5deg); }

    /* ── Category colors ── */
    .cat-work     { background: rgba(30,58,95,0.85);  color: #60a5fa; }
    .cat-personal { background: rgba(59,31,95,0.85);  color: #c084fc; }
    .cat-health   { background: rgba(26,61,46,0.85);  color: #34d399; }
    .cat-shopping { background: rgba(61,42,16,0.85);  color: #fb923c; }
    .cat-study    { background: rgba(59,42,16,0.85);  color: #fbbf24; }
    .cat-other    { background: rgba(31,41,55,0.85);  color: #9ca3af; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 56px 16px; color: #374151; }
    .empty .eicon { font-size: 3.5rem; margin-bottom: 14px; display: inline-block; animation: floatIcon 3s ease-in-out infinite; }
    @keyframes floatIcon { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .empty p { font-size: 0.95rem; }

    /* ── Confetti ── */
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0)      rotate(0deg)   scale(1); }
      100% { opacity: 0; transform: translateY(140px)  rotate(720deg) scale(0.2); }
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      header { flex-direction: column; gap: 10px; text-align: center; }
      #clock { text-align: center; }
      .user-cards { flex-direction: column; align-items: center; }
      .user-card { width: 100%; max-width: 280px; }
    }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="particles" id="particles"></div>

<!-- ── User selection screen ── -->
<div id="user-screen">
  <div class="logo">✦ Task Manager</div>
  <div class="tagline">Who's tackling their goals today?</div>
  <div class="user-cards">
    <div class="user-card" data-u="mahak" onclick="selectUser('mahak')">
      <div class="uav">👦</div>
      <div class="uname">Mahak</div>
      <div class="utasks" id="cnt-mahak">Loading…</div>
    </div>
    <div class="user-card" data-u="denish" onclick="selectUser('denish')">
      <div class="uav">👨</div>
      <div class="uname">Denish</div>
      <div class="utasks" id="cnt-denish">Loading…</div>
    </div>
    <div class="user-card" data-u="shreeshail" onclick="selectUser('shreeshail')">
      <div class="uav">🧔</div>
      <div class="uname">Shreeshail</div>
      <div class="utasks" id="cnt-shreeshail">Loading…</div>
    </div>
  </div>
</div>

<!-- ── Main app ── -->
<div id="app">
  <header>
    <div class="hlogo">Daily <span>Task Manager</span></div>
    <div class="header-right">
      <div id="clock"></div>
      <div class="ubadge" onclick="switchUser()" title="Switch user">
        <div class="bav" id="bav">👤</div>
        <div>
          <div class="bname" id="bname">—</div>
          <div class="bswitch">Switch user ↗</div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="add-card">
      <h2>⚡ New Task</h2>
      <div class="form-row">
        <input type="text" id="task-input" placeholder="What do you need to do?" maxlength="120"/>
        <select id="cat-select">
          <option value="work">💼 Work</option>
          <option value="personal">🌟 Personal</option>
          <option value="health">🏃 Health</option>
          <option value="shopping">🛒 Shopping</option>
          <option value="study">📚 Study</option>
          <option value="other">📌 Other</option>
        </select>
        <input type="time" id="remind-time" title="Set reminder"/>
        <button class="btn-add" onclick="addTask()">Add Task</button>
      </div>
      <div class="notif-row">
        <label class="toggle">
          <input type="checkbox" id="notif-toggle" onchange="toggleNotifications()"/>
          <span class="slider"></span>
        </label>
        <span>Browser notifications</span>
        <span id="notif-status"></span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-chip"><strong id="s-total">0</strong>Total</div>
      <div class="stat-chip"><strong id="s-done">0</strong>Done</div>
      <div class="stat-chip"><strong id="s-pending">0</strong>Pending</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Daily Progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('work',this)">💼 Work</button>
      <button class="filter-btn" onclick="setFilter('personal',this)">🌟 Personal</button>
      <button class="filter-btn" onclick="setFilter('health',this)">🏃 Health</button>
      <button class="filter-btn" onclick="setFilter('shopping',this)">🛒 Shopping</button>
      <button class="filter-btn" onclick="setFilter('study',this)">📚 Study</button>
      <button class="filter-btn" onclick="setFilter('other',this)">📌 Other</button>
    </div>

    <div id="task-list"></div>
  </main>
</div>

<script>
  /* ── User config ── */
  const USERS = {
    mahak:      { name:'Mahak',      av:'👦', a1:'#f9a8d4', a2:'#ec4899', glow:'rgba(236,72,153,0.35)'  },
    denish:     { name:'Denish',     av:'👨', a1:'#93c5fd', a2:'#3b82f6', glow:'rgba(59,130,246,0.35)'  },
    shreeshail: { name:'Shreeshail', av:'🧔', a1:'#6ee7b7', a2:'#10b981', glow:'rgba(16,185,129,0.35)' },
  };

  const CAT_LABELS = {
    work:'💼 Work', personal:'🌟 Personal', health:'🏃 Health',
    shopping:'🛒 Shopping', study:'📚 Study', other:'📌 Other'
  };

  let currentUser = null;
  let tasks = [];
  let activeFilter = 'all';
  const reminders = {};

  /* ── Floating particles ── */
  (function spawnParticles() {
    const el = document.getElementById('particles');
    const colors = ['#818cf8','#ec4899','#06b6d4','#10b981','#fbbf24'];
    for (let i = 0; i < 30; i++) {
      const d = document.createElement('div');
      const sz = 2 + Math.random() * 4;
      d.className = 'particle';
      d.style.cssText = `
        width:${sz}px; height:${sz}px;
        background:${colors[i % colors.length]};
        left:${Math.random()*100}vw;
        top:${60 + Math.random()*40}vh;
        animation-duration:${8 + Math.random()*14}s;
        animation-delay:${-Math.random()*20}s;
      `;
      el.appendChild(d);
    }
  })();

  /* ── Theme ── */
  function applyTheme(key) {
    const u = USERS[key];
    const r = document.documentElement.style;
    r.setProperty('--a1', u.a1);
    r.setProperty('--a2', u.a2);
    r.setProperty('--glow', u.glow);
    document.querySelector('.orb1').style.background = u.a2;
    document.querySelector('.orb2').style.background = u.a1;
  }

  /* ── User counts on selection screen ── */
  function refreshCounts() {
    Object.keys(USERS).forEach(k => {
      const t = JSON.parse(localStorage.getItem('dtm_' + k) || '[]');
      const p = t.filter(x => !x.done).length;
      document.getElementById('cnt-' + k).textContent =
        t.length === 0 ? 'No tasks yet' : `${p} pending · ${t.length} total`;
    });
  }

  /* ── Select user ── */
  function selectUser(key) {
    currentUser = key;
    tasks = JSON.parse(localStorage.getItem('dtm_' + key) || '[]');
    applyTheme(key);

    const u = USERS[key];
    document.getElementById('bav').textContent  = u.av;
    document.getElementById('bname').textContent = u.name;

    document.getElementById('user-screen').classList.add('hidden');

    activeFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach((b, i) =>
      b.classList.toggle('active', i === 0));

    tasks.forEach(scheduleReminder);
    render();
    updateNotifStatus();
  }

  /* ── Switch user ── */
  function switchUser() {
    Object.values(reminders).forEach(clearTimeout);
    Object.keys(reminders).forEach(k => delete reminders[k]);
    currentUser = null;
    tasks = [];
    refreshCounts();
    document.getElementById('user-screen').classList.remove('hidden');
  }

  /* ── Clock ── */
  function updateClock() {
    const now  = new Date();
    const date = now.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});
    const time = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('clock').innerHTML = `${date}<br><strong>${time}</strong>`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ── Notifications ── */
  function toggleNotifications() {
    const on = document.getElementById('notif-toggle').checked;
    if (!on) { updateNotifStatus(); return; }
    Notification.requestPermission().then(p => {
      if (p !== 'granted') document.getElementById('notif-toggle').checked = false;
      updateNotifStatus();
    });
  }
  function updateNotifStatus() {
    const el = document.getElementById('notif-status');
    const on = document.getElementById('notif-toggle').checked;
    if (!('Notification' in window)) { el.textContent = '(not supported)'; return; }
    el.textContent = (on && Notification.permission === 'granted') ? '🔔 On'
                   : on ? '⚠️ Permission denied' : '🔕 Off';
  }
  function scheduleReminder(task) {
    if (!task.remindAt || task.done) return;
    const [h,m] = task.remindAt.split(':').map(Number);
    const target = new Date(); target.setHours(h,m,0,0);
    if (target <= new Date()) return;
    reminders[task.id] = setTimeout(() => {
      if (Notification.permission === 'granted' && document.getElementById('notif-toggle').checked)
        new Notification('Reminder — ' + USERS[currentUser].name, { body: task.title + ' · ' + CAT_LABELS[task.cat] });
    }, target - new Date());
  }
  function clearReminder(id) {
    if (reminders[id]) { clearTimeout(reminders[id]); delete reminders[id]; }
  }

  /* ── Core ── */
  function save() {
    if (currentUser) localStorage.setItem('dtm_' + currentUser, JSON.stringify(tasks));
  }

  function addTask() {
    if (!currentUser) return;
    const inp = document.getElementById('task-input');
    const title = inp.value.trim();
    if (!title) { inp.focus(); return; }
    const task = {
      id: Date.now(), title,
      cat: document.getElementById('cat-select').value,
      remindAt: document.getElementById('remind-time').value || null,
      done: false,
      createdAt: new Date().toISOString()
    };
    tasks.unshift(task);
    save(); scheduleReminder(task);
    inp.value = '';
    document.getElementById('remind-time').value = '';
    render();
  }

  function toggleDone(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    t.done = !t.done;
    if (t.done) { clearReminder(id); spawnConfetti(); }
    else scheduleReminder(t);
    save(); render();
  }

  function deleteTask(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => { clearReminder(id); tasks = tasks.filter(x => x.id !== id); save(); render(); }, 300);
    } else {
      clearReminder(id); tasks = tasks.filter(x => x.id !== id); save(); render();
    }
  }

  function setFilter(cat, btn) {
    activeFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  /* ── Confetti burst ── */
  function spawnConfetti() {
    const palette = ['#f9a8d4','#6ee7b7','#93c5fd','#fbbf24','#c084fc','#fb923c'];
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('div');
      const sz = 5 + Math.random() * 9;
      el.style.cssText = `
        position:fixed; z-index:9999; pointer-events:none;
        width:${sz}px; height:${sz}px;
        border-radius:${Math.random() > 0.5 ? '50%' : '3px'};
        background:${palette[i % palette.length]};
        left:${15 + Math.random() * 70}vw;
        top:${25 + Math.random() * 35}vh;
        animation: confettiFall 1.1s ease-out ${Math.random() * 0.35}s both;
        transform: rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }
  }

  /* ── Render ── */
  function render() {
    const list = document.getElementById('task-list');
    const visible = activeFilter === 'all' ? tasks : tasks.filter(t => t.cat === activeFilter);

    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;

    function setNum(id, val) {
      const el = document.getElementById(id);
      if (el.textContent !== String(val)) {
        el.textContent = val;
        el.classList.remove('pop');
        void el.offsetWidth;
        el.classList.add('pop');
      }
    }
    setNum('s-total',   total);
    setNum('s-done',    done);
    setNum('s-pending', total - done);

    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent  = pct + '%';

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty"><div class="eicon">📋</div><p>No tasks here — add one above!</p></div>`;
      return;
    }

    list.innerHTML = visible.map(t => {
      const timeStr  = t.remindAt ? `⏰ ${t.remindAt}` : '';
      const dateStr  = new Date(t.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      return `
        <div class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}">
          <label class="check-wrap">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleDone(${t.id})"/>
            <div class="check-box"></div>
          </label>
          <div class="task-body">
            <div class="task-title">${esc(t.title)}</div>
            <div class="task-meta">
              <span class="cat-badge cat-${t.cat}">${CAT_LABELS[t.cat]}</span>
              ${timeStr ? `<span>${timeStr}</span>` : ''}
              <span>Added ${dateStr}</span>
            </div>
          </div>
          <button class="btn-del" onclick="deleteTask(${t.id})" title="Delete">🗑</button>
        </div>`;
    }).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  /* ── Init ── */
  refreshCounts();
</script>
</body>
</html>
